<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX BOT - الدعم الفني</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
        body{background:#0f172a;color:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .support-box{background:rgba(30,41,59,0.95);padding:50px 40px;border-radius:24px;max-width:480px;width:90%;box-shadow:0 25px 80px rgba(99,102,241,0.3);border:1px solid rgba(255,255,255,0.1);text-align:center}
        .logo{margin-bottom:25px}
        .logo i{font-size:60px;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .logo h1{font-size:30px;font-weight:800;margin-top:8px;background:linear-gradient(135deg,#f8fafc,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .logo p{color:#64748b;font-size:14px;margin-top:3px}
        .btn-discord{width:100%;padding:16px;border:none;border-radius:12px;background:#5865F2;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;gap:12px;text-decoration:none;margin-bottom:15px}
        .btn-discord:hover{background:#4752C4;transform:translateY(-2px);box-shadow:0 10px 30px rgba(88,101,242,0.4)}
        .btn-discord i{font-size:24px}
        .btn-email{width:100%;padding:14px;border:none;border-radius:12px;background:#EA4335;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;margin-bottom:15px}
        .btn-email:hover{background:#d33426;transform:translateY(-2px);box-shadow:0 10px 30px rgba(234,67,53,0.4)}
        .btn-email i{font-size:20px}
        .btn-invite{width:100%;padding:14px;border:none;border-radius:12px;background:#57F287;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;margin-bottom:15px}
        .btn-invite:hover{background:#45c75a;transform:translateY(-2px);box-shadow:0 10px 30px rgba(87,242,135,0.4)}
        .btn-invite i{font-size:20px}
        .btn-back{width:100%;padding:14px;border:1px solid rgba(255,255,255,0.1);border-radius:12px;background:transparent;color:#94a3b8;font-size:14px;cursor:pointer;transition:.3s;text-decoration:none;display:block;text-align:center}
        .btn-back:hover{background:rgba(255,255,255,0.05);color:#f8fafc}
        .info{margin-top:25px;padding:20px;background:rgba(255,255,255,0.03);border-radius:12px;text-align:right}
        .info h3{color:#6366f1;margin-bottom:10px;font-size:16px}
        .info p{color:#94a3b8;font-size:13px;line-height:1.8}
        .info a{color:#818cf8;text-decoration:none}
        .info a:hover{text-decoration:underline}
    </style>
</head>
<body>
<div class="support-box">
    <div class="logo">
        <i class="fas fa-headset"></i>
        <h1>الدعم الفني</h1>
        <p>تواصل معنا مباشرة عبر Discord</p>
    </div>

    <a href="{{ discord_url }}" target="_blank" class="btn-discord">
        <i class="fab fa-discord"></i> تواصل معنا على Discord
    </a>

    <a href="/contact" class="btn-email">
        <i class="fas fa-envelope"></i> أرسل إيميل
    </a>

    <a href="{{ bot_url }}" class="btn-back">
        <i class="fas fa-arrow-right"></i> العودة إلى لوحة التحكم
    </a>

    <div class="info">
        <h3><i class="fas fa-info-circle"></i> كيف نقدر نساعدك؟</h3>
        <p>
            - استفسارات عامة عن البوت<br>
            - الإبلاغ عن أخطاء<br>
            - طلب ميزات جديدة<br>
            - دعم فني متخصص<br><br>
            <a href="{{ discord_url }}">اضغط هنا للتواصل المباشر</a> 💬<br>
            أو أرسل إيميل عبر <a href="mailto:{{ support_email }}">{{ support_email }}</a> 📧
        </p>
    </div>
</div>
</body>
</html>
