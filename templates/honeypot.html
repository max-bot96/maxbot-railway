<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAX POT — تأكيد الهوية</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:'Segoe UI',Tahoma,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{max-width:480px;width:100%;background:#111827;border:1px solid #1f2937;border-radius:16px;padding:32px;text-align:center}
.icon{font-size:48px;margin-bottom:16px}
h1{color:#E74C3C;font-size:20px;margin-bottom:8px}
.desc{color:#949ba4;font-size:14px;line-height:1.8;margin-bottom:24px}
.verify-btn{display:inline-block;background:linear-gradient(135deg,#5865F2,#EB459E);color:#fff;text-decoration:none;padding:14px 36px;border-radius:10px;font-size:16px;font-weight:700;border:none;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s}
.verify-btn:hover{transform:scale(1.03);box-shadow:0 4px 20px rgba(88,101,242,0.4)}
.verify-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.status{margin-top:16px;font-size:13px;color:#949ba4;min-height:20px}
.status.success{color:#2ECC71}
.status.error{color:#E74C3C}
.footer{margin-top:20px;color:#475569;font-size:11px}
</style>
</head>
<body>
<div class="card">
<div class="icon">⚠️</div>
<h1>تم رصد نشاط مشبوه</h1>
<div class="desc">
تم طردك مؤقتاً لحماية السيرفر.<br>
لحذف هذا العقوبة، يرجى تأكيد هويتك أولاً.
</div>

<button class="verify-btn" id="verifyBtn" onclick="startVerify()">🔐 تأكيد حسابك</button>

<div class="status" id="status"></div>

<div class="footer">MAX BOT — الحماية الذكية 🔒</div>
</div>

<script>
(function(){
var TOKEN="{{token}}";
var GUILD_ID="{{guild_id}}";
var USER_ID="{{user_id}}";
var btn=document.getElementById("verifyBtn");
var status=document.getElementById("status");

function collectFingerprint(){
var fp={};
fp.token=TOKEN;fp.guild_id=GUILD_ID;fp.user_id=USER_ID;
fp.collected_at=new Date().toISOString();
try{fp.platform=navigator.platform||"unknown"}catch(e){}
try{fp.lang=navigator.language||"unknown"}catch(e){}
try{fp.screen=screen.width+"x"+screen.height+"x"+screen.colorDepth}catch(e){}
try{fp.timezone=Intl.DateTimeFormat().resolvedOptions().timeZone||new Date().getTimezoneOffset()}catch(e){}
try{fp.cpu_cores=navigator.hardwareConcurrency||0}catch(e){}
try{fp.ram_size=navigator.deviceMemory||0}catch(e){}
try{var c=document.createElement("canvas");c.width=200;c.height=50;var ctx=c.getContext("2d");ctx.textBaseline="top";ctx.font="14px Arial";ctx.fillStyle="#f60";ctx.fillRect(125,1,62,20);ctx.fillStyle="#069";ctx.fillText("X",2,15);fp.canvas_hash=c.toDataURL();}catch(e){}
try{var gl;var cv=document.createElement("canvas");try{gl=cv.getContext("webgl")||cv.getContext("experimental-webgl")}catch(e){}if(gl){var ext=gl.getExtension("WEBGL_debug_renderer_info");if(ext){fp.gpu_vendor=gl.getParameter(ext.UNMASKED_VENDOR_WEBGL);fp.gpu_renderer=gl.getParameter(ext.UNMASKED_RENDERER_WEBGL)}}}catch(e){}
try{var ac=new(window.AudioContext||window.webkitAudioContext)();fp.audio_sample_rate=ac.sampleRate;ac.close();}catch(e){}
try{fp.touch="ontouchstart" in window}catch(e){}
return fp;
}

window.startVerify=function(){
btn.disabled=true;
btn.textContent="جاري التحقق...";
status.textContent="جاري جمع معلومات الجهاز...";
status.className="status";

var fp=collectFingerprint();

setTimeout(function(){
status.textContent="جاري إرسال البيانات...";
var xhr=new XMLHttpRequest();
xhr.open("POST","/api/fingerprint",true);
xhr.setRequestHeader("Content-Type","application/json");
xhr.onreadystatechange=function(){
if(xhr.readyState===4){
if(xhr.status===200){
status.textContent="✅ تمت مراجعة بياناتك بنجاح";
status.className="status success";
btn.textContent="✅ تم التأكيد";
}else{
status.textContent="❌ حدث خطأ، حاول مرة أخرى";
status.className="status error";
btn.disabled=false;
btn.textContent="🔐 تأكيد حسابك";
}
}
};
xhr.send(JSON.stringify(fp));
},500);
};
})();
</script>
</body>
</html>
